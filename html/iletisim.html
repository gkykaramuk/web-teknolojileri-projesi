<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim</title>
    <link rel="stylesheet" href="/css/iletisim.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>

<nav class="navbar bg-dark border-bottom py-4">
  <div class="container">
      <a class="navbar-brand fs-2 fw-bold" href="iletisim.html" style="color: white;">
        İletişim
      </a>
      <div class="navigation-bar">
        <a href="index.html" class="me-3 text-decoration-none fs-5 active">Ana Sayfa</a>
        <a href="cv.html" class="me-3 text-decoration-none fs-5" >CV</a>
        <a href="sehirim.html" class="me-3 text-decoration-none fs-5">Şehrim</a>
        <a href="iletisim.html" class="text-decoration-none fs-5" >İletişim</a>
      </div>
   </div>
</nav>

<section class="contact-box container mt-5">

   <h2 class="contact-title">İletişim</h2>
   <p class="text-muted">
   Benimle iletişime geçmek için formu doldurabilirsiniz.
   </p>
   <hr>

<form id="contactForm">

<div class="row g-4 mt-4">

     <div class="col-6">
      <label for="username" class="form-label">Ad Soyad</label>
      <input type="text" class="form-control" id="username" name="username" required placeholder="Ad Soyad">
     </div>

     <div class="col-6">
      <label for="email" class="form-label">E-posta</label>
      <input type="email" class="form-control" id="email" name="email" required placeholder="E-posta">
     </div>

     <div class="col-6">
      <label for="phone" class="form-label">Telefon</label>
      <input type="tel" class="form-control" id="phone" name="phone" required placeholder="Telefon">
     </div>

    <div class="col-6">
     <label for="information" class="form-label">Konu</label>
     
     <select class="form-select" id="information" name="information" required>
        <option value="" selected disabled>Konu seçiniz</option>
       <option>Bilgi Talebi</option>
       <option>Proje Teklifi</option>
       <option>Teklif İsteği</option>
       <option>Görüşme Talebi</option>
       <option>Sponsorluk/İşbirliği</option>
     </select>
    
    </div>

    <div class="col-6">
        <label for="date" class="form-label">İletişim Tarihi</label>
        <input type="date" class="form-control" id="date" name="date" required>
    </div>

    <div class="col-6">
     <label for="content" class="form-label">Konu İçeriği</label>
     
     <select class="form-select" id="content" name="content" required>
       <option value="" selected disabled>Konu seçiniz</option>
       <option>Bilgi Talebi</option>
       <option>Proje Teklifi</option>
       <option>Teklif İsteği</option>
       <option>Görüşme Talebi</option>
       <option>Sponsorluk/İşbirliği</option>
     </select>
     
    </div>

    <div class="col-12">
     <label for="message" class="form-label">Mesaj</label>
     <textarea rows="5" class="form-control fixed-textarea" id="message" name="message" 
        required placeholder="Mesajınız.."></textarea>
    </div>

 <div class="col-2">
    <div class="form-box">
     <label class="form-label d-block mb-2" for="gender">Cinsiyet</label>
      
     <div class="form-check">
      <input class="form-check-input" value="erkek" name="gender" id="male" type="radio" required>
      <label class="form-check-label" for="male">Erkek</label>
     </div>

    <div class="form-check">
     <input class="form-check-input" value="kadın" name="gender" id="female" type="radio">
     <label class="form-check-label" for="female">Kadın</label>
    </div>

    <div class="form-check">
     <input class="form-check-input" value="diger" name="gender" id="other" type="radio">
     <label class="form-check-label" for="other">Diğer</label>
    </div>
   </div>
 </div>


 <div class="col-2">
    <div class="form-box">
     <label class="form-label d-block mb-2 " for="contact"  >İletişim Türü</label>
      

     <div class="form-check">
      <input class="form-check-input" type="radio" name="contact" id="eposta" required>
      <label class="form-check-label" for="eposta">E-posta</label>
     </div>

    <div class="form-check">
     <input class="form-check-input" type="radio" name="contact" id="telephone" >
     <label class="form-check-label" for="telephone">Telefon</label>
    </div>

    <div class="form-check">
     <input class="form-check-input" type="radio" name="contact" id="linkedin">
     <label class="form-check-label" for="linkedin">LinkedIn</label>
    </div>
    </div>
 </div>

  <div class="col-8 ">
    <div class="form-box">

     <label class="form-label d-block mb-2 ">İlgi Alanları</label>

      <div class="row">
        <div class="col-4">       
             <div class="form-check">
                <input class="form-check-input" type="checkbox" id="web" name="web">
                <label class="form-check-label" for="web">Web Geliştirme</label>
             </div>
        </div>

        <div class="col-4">
             <div class="form-check">
                <input class="form-check-input" type="checkbox" id="cyber" name="cyber">
                <label class="form-check-label" for="cyber">Siber Güvenlik</label>
            </div>
        </div>
        
        <div class="col-4">
             <div class="form-check">
                 <input class="form-check-input" type="checkbox" id="ai" name="ai">
                 <label class="form-check-label" for="ai">Yapay Zeka</label>
             </div>
        </div>   
        
        <div class="col-4">
             <div class="form-check">
                 <input class="form-check-input" type="checkbox" id="mobile" name="mobile">
                 <label class="form-check-label" for="mobile">Mobil Uygulama</label>
             </div>
        </div> 

        <div class="col-4">
             <div class="form-check">
                 <input class="form-check-input" type="checkbox" id="game" name="game">
                 <label class="form-check-label" for="game">Oyun Geliştime</label>
             </div>
        </div> 

        <div class="col-4">
             <div class="form-check">
                 <input class="form-check-input" type="checkbox" name="data" id="data">
                 <label class="form-check-label" for="data">Veri Bilimi</label>
             </div>
        </div>

        <div class="col-4">
             <div class="form-check">
                 <input class="form-check-input" type="checkbox" name="backend" id="backend">
                 <label class="form-check-label" for="backend">Backend Geliştirme</label>
             </div>
        </div>

        <div class="col-4">
             <div class="form-check">
                 <input class="form-check-input" type="checkbox" name="ui-ux" id="ui-ux">
                 <label class="form-check-label" for="ui-ux">UI/UX Tasarım</label>
             </div>
        </div>

        <div class="col-4">
             <div class="form-check">
                 <input class="form-check-input" type="checkbox" name="blockchain" id="blockchain">
                 <label class="form-check-label" for="blockchain">Blockchain</label>
             </div>
        </div>

      </div>

    </div>
  </div>

  <div class="row mt-4 align-items-center">

  <div class="col-6">
      <button class="btn btn-outline-dark me-2" type="button" id="jsButton"> Javascript ile Gönder</button>
      <button class="btn btn-outline-dark" type="button" id="vueButton">Vue ile Gönder</button>
    </div>

    <div class="col-6 text-end">
      <button class="btn btn-danger" type="reset" id="reset">Temizle</button>
    </div>  
  </div>

</div>

</form>
</section>

<footer class="container mt-5 mb-4 text-center text-muted">

</body>
</html>
